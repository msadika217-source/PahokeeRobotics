<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Medical Archives</title>
    <link href="https://fonts.googleapis.com/css2?family=Calligraffitti&display=swap" rel="stylesheet">
    
    <style>
       video {
    width: 100%;       /* Fills the container width */
    max-width: 600px;  /* Make pretty on computer*/
    height: auto;      /* Keeps the original shape */
}     /* Keeps the video from looking dead */

        body { background-color: #f7f7f7; color: #000000; font-family: 'Calligraffitti', sans-serif; text-align: center; }
        .pencil-logo { color: #970000; font-weight: bold; font-size: 40px; margin-top: 50px; font-family: 'Calligraffitti', cursive; }
        .search-container { margin: 20px auto; max-width: 500px; }
        input[type="text"] { padding: 10px; width: 70%; border-radius: 5px; border: 1px solid #ffcffb; background: #F2D2BD; color: black; }
        button { padding: 10px 20px; background-color: #CC8C97; color: #fafae2; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin: 5px; }
        button:hover { background-color: #970000; }
        .archive-item { display: none; margin-top: 40px; }
        video { border: 2px solid #494949; border-radius: 10px; }
        
      </style>
</head>

<body>

    <div style="display: flex; flex-direction: column; align-items: flex-end; width: 95%; margin: 10px auto;">
        <button type="button" onclick="showSources()">Robotics Overview</button>
        <button type="button" onclick="toggleCredits()">Teams</button>

            <button type="button" onclick="toggleCredits()" style="background-color: #494949; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer;">Close</button>
        </div>
    </div>

    <div class="pencil-logo">☤ Pahokee Robotics</div>
    <hr style="width: 80%; border: 0.5px solid #aa4545; margin: 20px auto;">

    <div class="search-container">
        <input type="text" id="search-input" placeholder="Search (e.g. Teams)...">
        <button type="button" onclick="performSearch()">Search</button>
    </div>

    <p>Pahokee Robotics</p>  
    
    <h3 style="text-align:left; font-family:Monospace; margin-left: 10%;"> Description of this Website:</h3>

</body>
</html>
